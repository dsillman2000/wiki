name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ruff
        run: uv run ruff check wiki_client/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check wiki_client/ tests/

      - name: Run prettier check
        run: npx prettier@3.8.1 --check "**/*.md"

      - name: Run shellcheck
        run: shellcheck install.sh lint.sh uninstall.sh
