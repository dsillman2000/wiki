name: Install Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wiki-cli Python package
        run: |
          pip install -e .

      - name: Verify wiki is in PATH
        run: |
          which wiki
          wiki --version

      - name: Run wiki --check
        run: wiki --check

      - name: Uninstall wiki-cli
        run: pip uninstall --yes wiki-cli

      - name: Verify removal
        run: |
          if command -v wiki >/dev/null 2>&1; then
            echo "wiki still found in PATH after uninstall"
            exit 1
          fi
          echo "Uninstall verified"

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pytest pytest-httpx

      - name: Run tests
        run: python -m pytest tests/ -v
